{% extends 'yoga_app/base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Yoga Kailasa{% endblock %}

{% block content %}
<section class="py-16 bg-gradient-to-r from-amber-100 to-amber-50 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 max-w-md">
        <div class="bg-white p-8 rounded-xl shadow-lg text-center">
            <i class="fas fa-check-circle text-green-500 text-6xl mb-6"></i>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Password Reset Complete</h2>
            <p class="text-gray-600 mb-6">
                Your password has been set. You may go ahead and log in now.
            </p>
            <a href="{% url 'login' %}" class="inline-flex items-center bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full transition duration-300">
                <i class="fas fa-sign-in-alt mr-2"></i> Log in
            </a>
        </div>
    </div>
</section>
{% endblock %}
