[pytest]
DJANGO_SETTINGS_MODULE = yoga_kailasa.settings
python_files = tests.py test_*.py *_tests.py
addopts = -v --tb=short --strict-markers -x --cov=yoga_app --cov-report=term-missing --cov-fail-under=70
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    api: marks tests as API tests
    service: marks tests as service layer tests
    model: marks tests as model tests
    view: marks tests as view tests
