name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: yoga_test_db
          POSTGRES_USER: yoga_user
          POSTGRES_PASSWORD: yoga_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: yoga_kailasa.settings
      POSTGRES_DB: yoga_test_db
      POSTGRES_USER: yoga_user
      POSTGRES_PASSWORD: yoga_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SECRET_KEY: dummysecretkey
      PAYSTACK_PUBLIC_KEY: dummykey
      PAYSTACK_SECRET_KEY: dummykey
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Run migrations
        run: |
          python manage.py migrate
      - name: Run tests with coverage
        run: |
          coverage run manage.py test
      - name: Generate coverage report
        run: |
          coverage report
          coverage html
          coverage xml

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Test Failed on super-yoga"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          body: "The CI workflow failed. Please check the logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}."
