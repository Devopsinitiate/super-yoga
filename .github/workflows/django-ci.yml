name: Django CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yoga_test_db
          POSTGRES_USER: yoga_user
          POSTGRES_PASSWORD: yoga_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: yoga_kailasa.settings
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: 'false'
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: yoga_test_db
      POSTGRES_USER: yoga_user
      POSTGRES_PASSWORD: yoga_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      PAYSTACK_PUBLIC_KEY: pk_test_dummy
      PAYSTACK_SECRET_KEY: sk_test_dummy
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Check collectstatic
        run: python manage.py collectstatic --noinput --dry-run

      - name: Run pytest with coverage
        run: |
          pytest --cov=yoga_app --cov-report=term-missing --cov-report=xml --cov-fail-under=70 -x

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed — Yoga Kailasa (${{ github.ref_name }})"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            The CI workflow failed on branch ${{ github.ref_name }}.
            Commit: ${{ github.sha }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
